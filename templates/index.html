<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Georgia', serif; background: #F5F0EB; min-height: 100vh; padding: 48px 24px; }
        .container { max-width: 560px; margin: 0 auto; }
        h1 { font-size: 36px; color: #3D2B1F; margin-bottom: 8px; }
        p.sub { font-size: 12px; letter-spacing: 3px; text-transform: uppercase; color: #A08060; margin-bottom: 36px; }
        form { display: flex; gap: 12px; margin-bottom: 32px; }
        input { flex: 1; padding: 12px 16px; border: 2px solid #DDD5CC; background: #fff; font-family: 'Georgia', serif; font-size: 14px; color: #3D2B1F; outline: none; border-radius: 8px; }
        input:focus { border-color: #B48C6E; }
        button { padding: 12px 24px; background: #B48C6E; border: none; color: #fff; font-size: 12px; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; border-radius: 8px; font-family: 'Georgia', serif; }
        .task { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; background: #fff; border-radius: 10px; margin-bottom: 12px; border: 1px solid #EDE5DC; }
        .task.done span { text-decoration: line-through; color: #B0A898; }
        .task span { font-size: 15px; color: #3D2B1F; }
        .actions { display: flex; gap: 12px; }
        .actions a { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; text-decoration: none; }
        .complete { color: #7BC67E; }
        .delete { color: #C05050; }
        .empty { text-align: center; color: #B0A898; font-size: 14px; padding: 40px 0; font-style: italic; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Task Manager</h1>
        <p class="sub">Stay on top of your work</p>

        <form action="/add" method="POST">
            <input type="text" name="task" placeholder="Add a new task..." required>
            <button type="submit">Add</button>
        </form>

        {% if tasks %}
            {% for task in tasks %}
            <div class="task {% if task.done %}done{% endif %}">
                <span>{{ task.text }}</span>
                <div class="actions">
                    {% if not task.done %}
                    <a href="/complete/{{ loop.index0 }}" class="complete">Done</a>
                    {% endif %}
                    <a href="/delete/{{ loop.index0 }}" class="delete">Delete</a>
                </div>
            </div>
            {% endfor %}
        {% else %}
            <p class="empty">No tasks yet. Add one above.</p>
        {% endif %}
    </div>
</body>
</html>
